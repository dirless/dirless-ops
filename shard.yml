    # Do NOT upgrade until ops.db has been migrated to the new page size.
    # Worktree lives at ../trash-panda-db-v070 (git worktree of the trash-panda-db repo).
    path: ../trash-panda-db-v070

  toml:
    github: crystal-community/toml.cr
    version: "~> 0.8.1"

  dirless-http:
    github: dirless/dirless-http

development_dependencies:
  ameba:
    github: crystal-ameba/ameba
