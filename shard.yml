name: dirless-ops
version: 0.1.0

description: Centralized operations daemon for Dirless

authors:
  - Dirless <hello@dirless.io>

license: Private

crystal: ">= 1.20.0"

dependencies:
  grip:
    github: grip-framework/grip
    version: "~> 4.1.0"

  granite:
    github: amberframework/granite
    version: "~> 0.23.0"

  trash-panda-db:
